col_last_week = 上周
col_last_year = 25年同期
col_dod = 环比昨日
col_wow = 环比上周
col_yoy = 25年同比
col_mtd_title = 月累计
col_ytd_title = 年度累计
col_mtd_month = 月
col_mtd_avg = 日均
col_mtd_last_year_val = 25年同期
col_mtd_last_year_avg = 同期日均
col_mtd_ratio = 环比
col_mtd_yoy = 25年同比
col_ytd_avg = 年日均
col_ytd_val = 2026年
col_ytd_wknd = 周末日均
col_ytd_wday = 平日日均
col_ytd_last_year_avg = 25年日均
col_ytd_last_year_val = 2025年
