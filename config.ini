[SCHEDULE_CONFIG]
# 是否开启定时任务 (true: 按下方时间循环运行; false: 立即运行一次后退出)
enable_schedule = false
# 每天固定运行的时间点 (24小时制，多个时间用逗号分隔)
daily_times = 07:50, 08:30
# 循环运行的间隔时间 (单位: 分钟，0 表示不按间隔运行)
interval_minutes = 0

[API_CONFIG]
# 客流数据接口地址
flow_api_url = https://wy178.mynatapp.cc/inspinia/json/all_shop_jingfen/jxfx_plaza_data_1.json
# 停车场车流及收入数据接口地址
car_api_url = https://wy178.mynatapp.cc/inspinia/json/etcp_month_cheliu/two_month_car.json
# 天气预报接口地址 (高德地图API)
weather_api_url = https://restapi.amap.com/v3/weather/weatherInfo?city=210113&key=97aabc9c6293628011bac6bd5eb6d00d&extensions=all

[OUTPUT_CONFIG]
# 生成图片的宽度 (像素)
width = 2200
# 生成图片的高度 (像素)
height = 4000
# 最终生成的报表图片文件名
png_name = day_paper.png
# 渲染过程中使用的临时 HTML 文件名
html_name = temp_report.html

[REPORT_CONFIG]
# 报表标题的前缀名称 (通常为广场名称)
title_prefix = 沈阳沈北万达
# 报表的目标日期 (yesterday: 自动取昨日; YYYY-MM-DD: 取固定日期)
target_date = yesterday
# 同比对标的天数偏移 (364: 星期对齐，即对标去年同一个星期几; 365: 日期对齐)
yoy_offset = 384
# 报表使用的字体族
font_family = "SimSun", serif

[CHART_CONFIG]
# 趋势图表展示的历史天数
days = 30
# 单个图表区域的高度 (像素)
box_height = 530
# 折线是否平滑处理 (true/false)
smooth = true
# 折线节点是否显示圆点 (true/false)
show_symbol = true

[VISUAL_STYLE]
# 表格正文字体大小
font_size = 14px
# 单元格垂直内边距
padding_v = 10px
# 单元格水平内边距
padding_h = 3px
# 表格边框颜色
line_color = #333333
# 表格边框宽度
line_width = 1px
# “本日”列的背景颜色 (黄色)
color_today = #ffff00
# 普通表头盒子的背景颜色
color_box = #e7eef8
# “月累计”相关列的背景颜色
color_mtd = #fff9e6
# “年度累计”相关列的背景颜色
color_ytd = #f0f9eb
# 负值(下跌)时的字体颜色
neg_font_color = #ee0000
# 负值(下跌)时的背景高亮颜色
neg_bg_color = #fce4ec
# 正值(持平或增长)时的字体颜色
pos_font_color = #008800

[ROW_TITLES]
